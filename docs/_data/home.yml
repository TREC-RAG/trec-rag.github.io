hero:
  eyebrow: "TREC RAG 2026 · The first Agent-first track at TREC!"
  lead: "A TREC evaluation track for studying and benchmarking systems which combine retrieval and generation."
  primary:
    label: "Register for TREC"
    url: "https://trec.nist.gov/cfp.html"
  secondary:
    - label: "Track guidelines"
      url: "https://github.com/TREC-RAG/trec-rag-skills/tree/main/skills/trec-rag-2026-track-guidelines"
    - label: "Test topics"
      url: "https://github.com/TREC-RAG/trec-rag-data/tree/main/trec-rag-2026/test-data"

# Compact key-date chips under the hero
dates:
  - k: "Test topics"
    v: "Jul 6"
  - k: "Baselines"
    v: "Week of Jul 19"
  - k: "Submissions due"
    v: "Aug 8"
    key: true
  - k: "TREC 2026"
    v: "Nov 2026"

# The AGENTS note (machine-readable pointer), preserved from the old homepage
agents: >
  <strong>AGENTS 🤖:</strong> if you were sent here for guidelines, keep your
  context small and stay in the
  <a href="https://github.com/TREC-RAG/trec-rag-skills/tree/main/skills/trec-rag-2026-track-guidelines">TREC RAG 2026 Track Guidelines skill</a>.
  For other track skills, use
  <a href="https://github.com/TREC-RAG/trec-rag-skills/tree/main/skills">TREC-RAG/trec-rag-skills</a>.

# What's new — key information cards
news:
  - new: true
    title: "2026 test topics released"
    body: "Official TREC RAG 2026 test topics are now available."
    url: "https://github.com/TREC-RAG/trec-rag-data/tree/main/trec-rag-2026/test-data"
    cta: "Get the topics"
  - new: true
    title: "RAGDoll evaluation toolkit"
    body: "Run the full TREC RAG evaluation workflow end to end, from generating evaluation artifacts to scoring LLM responses."
    url: "https://github.com/castorini/RAGDoll"
    cta: "Try RAGDoll"
  - title: "New corpus: NVIDIA ClimbMix-400b"
    body: "ClimbMix-400b replaces MS MARCO v2.1 for 2026. Access it now through the Pyserini REST API!"
    url: "https://x.com/TREC_RAG/status/2055319930766053632"
    cta: "Announcement"
    secondary_url: "https://github.com/TREC-RAG/trec-rag-skills/tree/main/skills/pyserini-rest-api"
    secondary_cta: "REST API SKILL"

# Mission / overview (HTML allowed via block scalars)
overview:
  - >
    The <a href="https://trec.nist.gov/">TREC</a> Retrieval-Augmented Generation
    Track fosters innovation and research in retrieval-augmented generation systems:
    combining retrieval methods that find relevant information within large corpora
    with Large Language Models, to help systems produce relevant, accurate, updated,
    and contextually appropriate content.
  - >
    The track brings the research community together around a unified benchmark to
    evaluate the end-to-end performance of systems that combine retrieval and
    generation. Distinct but complementary tasks enable deeper analysis of individual
    components and their interactions.

# The two 2026 tasks
tasks:
  - mark: "R"
    title: "Retrieval"
    body: "The classic IR task: given a set of narratives and access to the ClimbMix collection, retrieve and rank the most relevant segments."
    url: "https://github.com/TREC-RAG/trec-rag-skills/blob/main/skills/trec-rag-2026-track-guidelines/references/retrieval-task.md"
  - mark: "RAG"
    title: "Retrieval-Augmented Generation"
    body: "Given a set of narratives, retrieve relevant evidence from the ClimbMix collection and return a summarized answer grounded in that evidence."
    url: "https://github.com/TREC-RAG/trec-rag-skills/blob/main/skills/trec-rag-2026-track-guidelines/references/rag-task.md"

# Timeline
timeline:
  - k: "Test topics released"
