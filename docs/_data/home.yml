  - icon: "fas fa-flask"
    title: "2026 development data"
    body: "Practice topics, RAG25 nuggets, UMBRELA qrels, and ResearchRubrics for system testing."
    url: "https://github.com/TREC-RAG/trec-rag-data/tree/main/trec-rag-2026/development-data"
  - icon: "fas fa-cat"
