<!-- TREC RAG: set theme before paint to avoid a flash of the wrong mode -->
<script>
  (function () {
    var root = document.documentElement;
    root.classList.add('trec-js');
    try {
      var q = new URLSearchParams(location.search).get('theme');
      var t = (q === 'dark' || q === 'light') ? q : localStorage.getItem('trec-theme');
      if (t === 'dark' || t === 'light') {
        root.setAttribute('data-theme', t);
        if (q === 'dark' || q === 'light') localStorage.setItem('trec-theme', t);
      }
    } catch (e) {}
  })();
</script>
